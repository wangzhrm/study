<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三国杀 · 积分系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --zhugong: linear-gradient(135deg, #d4af37, #8b0000);
            --neijian: linear-gradient(135deg, #4b0082, #1a2a6c);
            --fanzei: linear-gradient(135deg, #8b0000, #310000);
            --zhongchen: linear-gradient(135deg, #0d6b1a, #05330a);
        }

        body {
            background: #121212;
            background: radial-gradient(circle at center, #1a2a6c 0%, #000 100%);
            color: #fff;
            font-family: 'STKaiti', 'Microsoft YaHei', serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 700px; text-align: center; }

        h1 { font-size: 1.6rem; margin: 10px 0; color: #ffd700; }

        /* 只显示积分 */
        .stats-panel {
            width: 95%;
            background: rgba(0,0,0,0.8);
            border: 1px solid #ffd700;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.95rem;
            display: none;
        }

        .status-bar {
            background: rgba(255, 215, 0, 0.1);
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ffd700;
            margin: 10px 0;
            font-size: 1rem;
            color: #ffd700;
            font-weight: bold;
        }

        /* 身份配置提示 */
        .role-tip {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 8px 15px;
            margin: 10px 0;
            font-size: 0.95rem;
        }

        /* 卡片自适应 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            margin: 20px 0;
            width: 100%;
        }

        .card-wrapper {
            aspect-ratio: 2 / 3;
            perspective: 1000px;
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            border: 2px solid #ffd700;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 0.7rem;
            padding: 5px;
            box-sizing: border-box;
        }

        .card-back { 
            background: #1a5e20; 
        }
        .card-back .player-name {
            font-weight: bold;
            color: #ffd700;
            margin-top: 5px;
        }

        .card-front { 
            transform: rotateY(180deg); 
            text-align: center;
        }
        .card-front.zhugong { background: var(--zhugong); }
        .card-front.neijian { background: var(--neijian); }
        .card-front.fanzei { background: var(--fanzei); }
        .card-front.zhongchen { background: var(--zhongchen); }

        .card-front .icon { font-size: 2rem; margin-bottom: 5px; }
        .card-front h3 { font-size: 0.9rem; margin: 0; }

        .btn {
            background: #ffd700; 
            color: #000;
            border: none; 
            padding: 12px 24px;
            border-radius: 25px; 
            font-weight: bold;
            cursor: pointer; 
            margin: 8px 5px;
            font-size: 1rem;
            width: 80%;
        }

        .modal {
            position: fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background:rgba(0,0,0,0.95); 
            display: flex; 
            justify-content:center; 
            align-items:center; 
            z-index:100;
        }
        .modal-content {
            background:#222; 
            border-radius:15px; 
            border:1px solid #ffd700; 
            text-align:center;
            width: 85%;
            padding: 20px;
            max-width: 400px;
        }
        input {
            padding: 12px;
            margin: 8px 0;
            width: 90%;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- 仅积分 -->
    <div class="stats-panel" id="statsPanel"></div>

    <div class="container">
        <h1>三国杀 · 积分系统</h1>
        <div class="status-bar" id="status">准备游戏...</div>
        <div class="role-tip" id="roleTip" style="display:none;"></div>

        <div class="cards-container" id="cardsContainer"></div>

        <div id="gameControls">
            <button class="btn" onclick="revealAll()" id="endBtn" style="display:none">本局结算</button>
            <button class="btn" onclick="startNewRound()" id="nextBtn" style="display:none">下一局</button>
        </div>

        <div id="winnerSelect" style="display:none; margin-top: 20px;">
            <h3 style="color:#ffd700">选择获胜阵营</h3>
            <div id="winnerBtns"></div>
        </div>
    </div>

    <!-- 人数设置 -->
    <div class="modal" id="countModal">
        <div class="modal-content">
            <h2 style="color:#ffd700">玩家数量</h2>
            <p>支持 2~8 人</p>
            <input type="number" id="playerCount" min="2" max="8" value="3">
            <button class="btn" onclick="setPlayerCount()">确认</button>
        </div>
    </div>

    <!-- 姓名输入 -->
    <div class="modal" id="nameModal" style="display:none;">
        <div class="modal-content">
            <h2 style="color:#ffd700">输入玩家姓名</h2>
            <div id="nameInputs"></div>
            <button class="btn" onclick="initGame()">开始游戏</button>
        </div>
    </div>

<script>
    let players = [];
    let playerCount = 0;
    let scores = {};
    let currentRoles = [];
    let assignments = {};

    // 官方身份配置
    const ROLE_CONFIG = {
        2: [1, 0, 1, 0],
        3: [1, 0, 1, 1],
        4: [1, 1, 2, 0],
        5: [1, 1, 2, 1],
        6: [1, 1, 3, 1],
        7: [1, 2, 3, 1],
        8: [1, 2, 4, 1]
    };

    const ROLE_MAP = ['主公', '忠臣', '反贼', '内奸'];
    const ROLE_ICON = { '主公': '👑', '忠臣': '🛡️', '反贼': '⚔️', '内奸': '🎭' };
    const ROLE_CLASS = { '主公': 'zhugong', '忠臣': 'zhongchen', '反贼': 'fanzei', '内奸': 'neijian' };
    const SCORE_RULE = { '主公': 2, '忠臣': 2, '反贼': 2, '内奸': 3 };

    // 设置人数
    function setPlayerCount() {
        playerCount = parseInt(document.getElementById('playerCount').value);
        if (playerCount < 2 || playerCount > 8) {
            alert('请输入 2~8 人');
            return;
        }
        document.getElementById('countModal').style.display = 'none';
        document.getElementById('nameModal').style.display = 'flex';

        const nameInputs = document.getElementById('nameInputs');
        nameInputs.innerHTML = '';
        for (let i = 1; i <= playerCount; i++) {
            nameInputs.innerHTML += `<input type="text" placeholder="玩家${i}" value="玩家${i}" id="p${i}"><br>`;
        }
    }

    // 初始化游戏
    function initGame() {
        players = [];
        for (let i = 1; i <= playerCount; i++) {
            const name = document.getElementById(`p${i}`).value.trim() || `玩家${i}`;
            players.push(name);
        }

        players.forEach(p => { scores[p] = 0; });

        document.getElementById('nameModal').style.display = 'none';
        document.getElementById('statsPanel').style.display = 'block';
        startNewRound();
    }

    // 新一局
    function startNewRound() {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('winnerSelect').style.display = 'none';
        document.getElementById('endBtn').style.display = 'inline-block';
        document.getElementById('status').innerText = '身份已发放，依次查看自己身份';

        generateRoles();
        renderCards();
        updateScore();
        showRoleTip();
    }

    // 随机身份
    function generateRoles() {
        const config = ROLE_CONFIG[playerCount];
        currentRoles = [];
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < config[i]; j++) {
                currentRoles.push(ROLE_MAP[i]);
            }
        }
        currentRoles.sort(() => Math.random() - 0.5);
        assignments = {};
        players.forEach((p, idx) => { assignments[p] = currentRoles[idx]; });
    }

    // 卡片
    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        players.forEach((player, idx) => {
            const role = assignments[player];
            container.innerHTML += `
            <div class="card-wrapper">
                <div class="card" id="card-${idx}" onclick="toggleCard(${idx})">
                    <div class="card-face card-back">
                        <span>身份牌</span>
                        <div class="player-name">${player}</div>
                    </div>
                    <div class="card-face card-front ${ROLE_CLASS[role]}">
                        <div class="icon">${ROLE_ICON[role]}</div>
                        <h3>${role}</h3>
                        <span>${player}</span>
                    </div>
                </div>
            </div>`;
        });
    }

    // 翻转查看/盖回
    function toggleCard(idx) {
        document.getElementById(`card-${idx}`).classList.toggle('flipped');
    }

    // 结算展示全部
    function revealAll() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
        document.getElementById('endBtn').style.display = 'none';
        document.getElementById('winnerSelect').style.display = 'block';

        const btnArea = document.getElementById('winnerBtns');
        btnArea.innerHTML = '';
        const camps = [...new Set(Object.values(assignments))];
        camps.forEach(role => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = `${role}获胜`;
            btn.onclick = () => {
                players.forEach(p => {
                    if (assignments[p] === role) scores[p] += SCORE_RULE[role];
                });
                updateScore();
                document.getElementById('winnerSelect').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'inline-block';
            };
            btnArea.appendChild(btn);
        });
    }

    // 仅更新积分
    function updateScore() {
        let html = `<b>🏆 积分</b><br>`;
        html += players.map(p => `${p}: ${scores[p]}`).join('　');
        document.getElementById('statsPanel').innerHTML = html;
    }

    // 身份配置提示
    function showRoleTip() {
        const c = ROLE_CONFIG[playerCount];
        document.getElementById('roleTip').innerText = 
            `${playerCount}人配置：主公${c[0]} 忠臣${c[1]} 反贼${c[2]} 内奸${c[3]}`;
        document.getElementById('roleTip').style.display = 'block';
    }
</script>
</body>
</html>
